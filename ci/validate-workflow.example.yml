name: Validate Report Artifacts

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Regenerate deterministic artifacts
        run: |
          python scripts/simulate_alternatives.py --trials 5000 --seed 7331
          python scripts/license_audit.py

      - name: Validate artifacts
        run: python scripts/validate_artifacts.py

      - name: Check generated outputs are committed
        run: git diff --exit-code
