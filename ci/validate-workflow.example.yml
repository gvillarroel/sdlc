name: Validate Report Artifacts

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Regenerate and validate artifacts
        run: python scripts/run_all_checks.py

      - name: Check generated outputs are committed
        run: git diff --exit-code
